<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U</title>

    <style>
        /* Animación de giro continuo */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }        
        /* Clase para el vinilo girando - se activará solo en hover */
        .vinyl-card:hover .vinyl-spinning {
            animation: spin 2s linear infinite;
        }

        .modal-overlay {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.5);
            min-height: 100%;
            min-width: 100%;
        }
    </style>
</head>
<body class="bg-black">
    <main id="root"></main>

    <!-- Cargar React y ReactDOM desde CDN -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Opcional: Babel para usar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script type="module">
        import { Play, Pause, ChevronUp } from 'https://cdn.jsdelivr.net/npm/lucide-react@0.263.1/+esm';
        
        window.songs = [
            {
                id: 0,
                content: 'Cancion A',
                image: 'https://i.scdn.co/image/ab67616d0000b273d9194aa18fa4c9362b47464f'
            },
            {
                id: 1,
                content: 'Canción B',
                image: 'https://placehold.co/400'
            },
            {
                id: 3,
                content: 'Canción C',
                image: 'https://placehold.co/400'
            },
            {
                id: 4,
                content: 'Canción D',
                image: 'https://placehold.co/400'
            },
            {
                id: 5,
                content: 'Canción A',
                image: 'https://i.scdn.co/image/ab67616d0000b273d9194aa18fa4c9362b47464f'
            },
            {
                id: 6,
                content: 'Canción B',
                image: 'https://placehold.co/400'
            },
            {
                id: 7,
                content: 'Canción C',
                image: 'https://placehold.co/400'
            },
            {
                id: 8,
                content: 'Canción D',
                image: 'https://placehold.co/400'
            },
        ];
        
        // Guardar los iconos en window para usarlos en el script de Babel
        window.LucideIcons = { Play, Pause, ChevronUp };
    </script>

    <!-- Tu código React -->
    <script type="text/babel">
        const { createContext, useContext, useState, useCallback } = React;

        // Obtener los iconos desde window
        const { Play, Pause, ChevronUp } = window.LucideIcons;

        const ModalContext = createContext();

        const LibraryLayout = ({ children }) => {
            const [modalOpened, setModalState] = useState(false);
            const [modalData, setModalData] = useState(null);

            const openModal = (data) => {
                setModalData(data);
                setModalState(true);
            };
            
            const closeModal = () => {
                setModalState(false);
                setModalData(null);
            };

            return (
                <ModalContext.Provider value={{ 
                    modalOpened, 
                    setModalState, 
                    openModal, 
                    closeModal,
                    modalData
                }}>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-y-20 min-h-screen justify-content-center md:content-center p-15 md:p-5 relative">
                        {children}
                        {modalOpened && (
                            <ModalPlayer />
                        )}
                    </div>
                </ModalContext.Provider>
            );
        }

        const ButtonPlayer = ({ song }) => {
            const { openModal } = useContext(ModalContext);

            return (
                <button 
                    onClick={() => openModal({ ...song })}
                    className="bg-red-500 w-full p-3 md:p-5 font-bold flex flex-col md:flex-row justify-center md:justify-between items-center rounded-lg md:rounded-full cursor-pointer"
                >
                    <div className="overflow-hidden text-nowrap text-ellipsis hover:underline w-full md:w-[50%]">
                        {song.content}
                    </div>
                    
                    <Play
                        className="hover:fill-red-200 hover:stroke-red-200"
                        size={20}
                        color="white"
                        fill="white"
                    />
                </button>
            )
        };

        const VinylCard = ({ song }) => (
            <div className="vinyl-card relative min-w-20 max-w-30 md:max-w-70 justify-self-center md:self-center hover:scale-120 transition text-white">
                <div className="rounded-full aspect-square flex justify-center items-center p-5 md:p-20 bg-white mb-2 vinyl-spinning">
                    <img className="rounded-full aspect-square h-12 md:h-30" src={song.image} />
                </div>
                <ButtonPlayer song={song} />
            </div>
        );

        const Player = ({ image, title }) => (
            <div className="grid grid-rows-2 md:grid-rows-1 grid-cols-auto md:grid-cols-2">
                <div className="flex flex-col gap-4 justify-center items-center">
                    <img className="rounded-lg shadow-black shadow-lg h-50 aspect-square" 
                        src={ image }
                        alt={ title }
                    />
                    <h1 className="font-bold">{ title }</h1>
                </div>
                <div>
                    
                </div>
            </div>
        );

        const ModalPlayer = () => {
            const { modalData: song, closeModal } = useContext(ModalContext);

            return (
                <div className="modal-overlay flex justify-center md:items-center px-18 py-10 md:p-30">
                    <div className="modal-content h-fit shadow-xl outline outline-2 outline-offset-2 outline-red-500 bg-red-500 p-5 rounded-2xl flex flex-col gap-2 text-white">
                        <Player
                            image={ song.image }
                            title={ song.content }
                        />
                        <button className="modal-close max-h-5 flex justify-center items-center" onClick={closeModal}>
                            <ChevronUp 
                                className="stroke-4"
                                size={20}
                                color="white"
                            />
                        </button>
                    </div>
                </div>
            );
        }

        // Renderizar la aplicación
        ReactDOM.createRoot(document.getElementById('root')).render(
            <LibraryLayout>
                {window.songs.map((song) => (
                    <VinylCard key={song.id} song={song} />
                ))}
            </LibraryLayout>
        );
    </script>
</body>
</html>
